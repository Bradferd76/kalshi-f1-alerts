name: Kalshi Alert

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - run: |
          echo "===== FILE CONTENTS ====="
          cat f1_alerts.py
          echo "===== END FILE ====="

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - run: python f1_alerts.py
